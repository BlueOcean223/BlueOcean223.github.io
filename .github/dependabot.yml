version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
